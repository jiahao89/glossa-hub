<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <!-- 迈金科技感渐变：青色到蓝色 -->
    <linearGradient id="favicon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2ff" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>
  
  <!-- 柔和的深灰色圆角方形底，保证在浏览器浅色和深色 Tab 下都极为清晰 -->
  <rect width="32" height="32" rx="8" fill="#121826" />
  
  <!-- 字母 G 的圆弧轮廓 (融合协作圆环) -->
  <path d="M16 6C10.477 6 6 10.477 6 16c0 5.523 4.477 10 10 10 3.3 0 6.2-1.6 8-4.1l-2.4-1.6C20.1 22.3 18.2 23.2 16 23.2c-3.97 0-7.2-3.23-7.2-7.2s3.23-7.2 7.2-7.2c2.2 0 4.1.9 5.6 2.5l2.4-1.6C22.2 7.6 19.3 6 16 6z" fill="url(#favicon-grad)" />
  
  <!-- 翻译互通双向箭头 -->
  <path d="M18 10l3 3-3 3M14 22l-3-3 3-3" stroke="url(#favicon-grad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
</svg>